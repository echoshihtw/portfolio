<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link
    rel="icon"
    href="%sveltekit.assets%/favicon.png"
  />
  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  />
  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />
  <script>
    (() => {
      const key = "echo-theme";
      let theme = "light";

      try {
        const savedTheme = localStorage.getItem(key);
        if (savedTheme === "light" || savedTheme === "dark") {
          theme = savedTheme;
        } else if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
          theme = "dark";
        }
      } catch (_error) {
        theme = "light";
      }

      document.documentElement.dataset.theme = theme;
      document.documentElement.classList.toggle("dark", theme === "dark");
    })();
  </script>
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    integrity="sha512-z3gLpd7yknf1YoNbCzqRKc4qyor8gaKU1qmn+CShxbuBusANI9QpRohGBreCFkKxLhei6S9CQXFEbbKuqLg0DA=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />
  <title>
    Echo Shih
  </title>
  %sveltekit.head%
</head>
<body
  data-sveltekit-preload-data="hover"
>
<div
  style="display: contents"
>
  %sveltekit.body%
</div>
</body>
</html>
